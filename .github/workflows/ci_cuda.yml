name: ci-3-ortops-cuda

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cuda_build:
    name: CUDA build and test (ubuntu-22.04)
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup CUDA toolkit
        uses: Jimver/cuda-toolkit@v0.2.21
        with:
          cuda: "12.4.0"

      - name: Install cuBLAS development libraries
        run: sudo apt-get install -y libcublas-dev-12-4

      - name: cmake configure
        run: cmake -S cmake -B _build -DCMAKE_BUILD_TYPE=Release

      - name: cmake build
        run: cmake --build _build --config Release --verbose

      - name: Verify CUDA shared library was built
        run: test -f yaourt/ortops/optim/cuda/libortops_optim_cuda.so

      - name: Install Python dependencies
        env:
          SKIP_CMAKE: "1"
        run: pip install -e .[dev]

      - name: pip freeze
        run: pip freeze

      - name: Run CUDA ortops tests
        run: pytest --durations=10 -v unittests/ortops/test_cuda_ops.py
