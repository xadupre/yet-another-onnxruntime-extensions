<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <!-- Background rounded rect -->
  <rect width="320" height="80" rx="10" ry="10" fill="#1a1a2e"/>

  <!-- Neural-network icon: three layers of nodes connected by edges -->
  <!-- Edges (drawn first so nodes appear on top) -->
  <!-- Input layer → hidden layer -->
  <line x1="28" y1="22" x2="58" y2="18" stroke="#4a9eff" stroke-width="1.2" stroke-opacity="0.6"/>
  <line x1="28" y1="22" x2="58" y2="40" stroke="#4a9eff" stroke-width="1.2" stroke-opacity="0.6"/>
  <line x1="28" y1="22" x2="58" y2="62" stroke="#4a9eff" stroke-width="1.2" stroke-opacity="0.6"/>
  <line x1="28" y1="58" x2="58" y2="18" stroke="#4a9eff" stroke-width="1.2" stroke-opacity="0.6"/>
  <line x1="28" y1="58" x2="58" y2="40" stroke="#4a9eff" stroke-width="1.2" stroke-opacity="0.6"/>
  <line x1="28" y1="58" x2="58" y2="62" stroke="#4a9eff" stroke-width="1.2" stroke-opacity="0.6"/>
  <!-- Hidden layer → output layer -->
  <line x1="58" y1="18" x2="88" y2="30" stroke="#4a9eff" stroke-width="1.2" stroke-opacity="0.6"/>
  <line x1="58" y1="18" x2="88" y2="50" stroke="#4a9eff" stroke-width="1.2" stroke-opacity="0.6"/>
  <line x1="58" y1="40" x2="88" y2="30" stroke="#4a9eff" stroke-width="1.2" stroke-opacity="0.6"/>
  <line x1="58" y1="40" x2="88" y2="50" stroke="#4a9eff" stroke-width="1.2" stroke-opacity="0.6"/>
  <line x1="58" y1="62" x2="88" y2="30" stroke="#4a9eff" stroke-width="1.2" stroke-opacity="0.6"/>
  <line x1="58" y1="62" x2="88" y2="50" stroke="#4a9eff" stroke-width="1.2" stroke-opacity="0.6"/>

  <!-- Input layer nodes -->
  <circle cx="28" cy="22" r="6" fill="#4a9eff"/>
  <circle cx="28" cy="58" r="6" fill="#4a9eff"/>
  <!-- Hidden layer nodes -->
  <circle cx="58" cy="18" r="6" fill="#7b5ea7"/>
  <circle cx="58" cy="40" r="6" fill="#7b5ea7"/>
  <circle cx="58" cy="62" r="6" fill="#7b5ea7"/>
  <!-- Output layer nodes -->
  <circle cx="88" cy="30" r="6" fill="#e05c5c"/>
  <circle cx="88" cy="50" r="6" fill="#e05c5c"/>

  <!-- Project name text -->
  <text x="108" y="36" font-family="'DejaVu Sans', 'Liberation Sans', Arial, sans-serif"
        font-size="22" font-weight="bold" fill="#4a9eff" letter-spacing="1">yaourt</text>
  <text x="108" y="60" font-family="'DejaVu Sans', 'Liberation Sans', Arial, sans-serif"
        font-size="11" fill="#aac4e0" letter-spacing="0.5">onnxruntime extensions</text>
</svg>
